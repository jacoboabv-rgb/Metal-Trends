<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro | Metal Trends</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://kit.fontawesome.com/a1124a3708.js" crossorigin="anonymous"></script>
    <link rel="stylesheet" href="css/estilos.css">
</head>

<body class="bg-dark text-light d-flex align-items-center" style="height:100vh;">

<div class="container">
    <div class="row justify-content-center">

        <div class="col-md-5">
            <div class="card bg-black border-danger shadow-lg p-4">

                <h3 class="text-center text-danger mb-4">
                    <i class="fas fa-user-plus"></i> Registro Metalero
                </h3>

                <form>

                    <div class="mb-3">
                        <label class="form-label">Nombre</label>
                        <input type="text" class="form-control bg-dark text-white border-secondary" placeholder="Tu nombre">
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Correo</label>
                        <input type="email" class="form-control bg-dark text-white border-secondary" placeholder="Tu correo">
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Contraseña</label>
                        <input type="password" class="form-control bg-dark text-white border-secondary">
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Confirmar Contraseña</label>
                        <input type="password" class="form-control bg-dark text-white border-secondary">
                    </div>

                    <button type="submit" class="btn btn-danger w-100 fw-bold">
                        CREAR CUENTA 🤘
                    </button>

                </form>

                <div class="text-center mt-3">
                    <a href="login.html" class="text-secondary small">¿Ya tienes cuenta? Inicia sesión</a>
                </div>

                <div class="text-center mt-2">
                    <a href="index.html" class="text-danger small">← Volver al inicio</a>
                </div>

            </div>
        </div>

    </div>
</div>

</body>
</html>
